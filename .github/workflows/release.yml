name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/rescontre
    permissions:
      id-token: write

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  smoke-test-testpypi:
    needs: publish-testpypi
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]

    steps:
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Resolve version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install from TestPyPI (with PyPI fallback for deps)
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            if pip install \
                 --index-url https://test.pypi.org/simple/ \
                 --extra-index-url https://pypi.org/simple/ \
                 "rescontre==${{ steps.version.outputs.value }}"; then
              exit 0
            fi
            echo "TestPyPI not yet serving the new release, attempt $attempt — sleeping 15s"
            sleep 15
          done
          exit 1

      - name: Import smoke test
        env:
          EXPECTED_VERSION: ${{ steps.version.outputs.value }}
        run: |
          python - <<'PY'
          import os
          import rescontre
          from rescontre import Client, RescontreConfigurationError

          expected = os.environ["EXPECTED_VERSION"]
          assert rescontre.__version__ == expected, rescontre.__version__

          os.environ.pop("RESCONTRE_API_KEY", None)
          try:
              Client(base_url="http://localhost")
          except RescontreConfigurationError:
              pass
          else:
              raise SystemExit("expected RescontreConfigurationError")

          Client(base_url="http://localhost", api_key="x" * 64).close()
          print("smoke OK:", rescontre.__version__)
          PY

  publish-pypi:
    needs: smoke-test-testpypi
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/rescontre
    permissions:
      id-token: write

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
